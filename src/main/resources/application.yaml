spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        git:
          uri: https://github.com/mcharith/Mediplus-Project-Configurations.git
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services

server:
  port: 9100